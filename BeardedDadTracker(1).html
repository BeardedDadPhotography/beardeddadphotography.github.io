<!-- Inline storage shim (localStorage) -->
<script>
window.storage = {
  get: (key) => Promise.resolve(localStorage.getItem(key) ? { value: localStorage.getItem(key) } : null),
  set: (key, value) => { localStorage.setItem(key, value); return Promise.resolve({ key, value }); },
  delete: (key) => { localStorage.removeItem(key); return Promise.resolve({ key, deleted: true }); },
  list: (prefix) => {
    const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
    return Promise.resolve({ keys });
  }
};
</script>

<!-- Service Worker registration for offline -->
<script>
if ('serviceWorker' in navigator) {
  const swCode = `
    const CACHE = 'bd-tracker-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
    });
    self.addEventListener('fetch', e => {
      e.respondWith(
        caches.match(e.request).then(r => r || fetch(e.request).catch(() => new Response('Offline')))
      );
    });
  `;
  const blob = new Blob([swCode], {type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>

// ── Calendar Tab ──────────────────────────────────────────────────────────────
function CalendarTab({ calEvents, setCalEvents }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title:"", date:"", startTime:"", endTime:"", location:"", notes:"" });
  const [missing, setMissing] = useState(false);
  const s = (k,v) => { setMissing(false); setForm(p=>({...p,[k]:v})); };

  const buildGCalURL = () => {
    const toGCal = (date, time) => `${date.replace(/-/g,"")}T${time.replace(/:/g,"")}00`;
    const params = new URLSearchParams({
      action:"TEMPLATE", text:form.title,
      dates:`${toGCal(form.date,form.startTime)}/${toGCal(form.date,form.endTime)}`,
      details:form.notes||"", location:form.location||"",
    });
    return `https://calendar.google.com/calendar/render?${params.toString()}`;
  };

  const handleOpen = () => {
    if (!form.title.trim()||!form.date||!form.startTime||!form.endTime) { setMissing(true); return; }
    setCalEvents(prev => [...prev, {
      id:"local-"+Date.now(), summary:form.title, location:form.location,
      start:{ dateTime:`${form.date}T${form.startTime}:00-06:00` },
    }].sort((a,b)=>new Date(a.start?.dateTime||a.start?.date)-new Date(b.start?.dateTime||b.start?.date)));
    window.open(buildGCalURL(),"_blank");
    setForm({ title:"", date:"", startTime:"", endTime:"", location:"", notes:"" });
    setShowForm(false);
  };

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14 }}>
        <div>
          <div style={{ fontSize:18, fontWeight:800, color:C.blue, letterSpacing:1 }}>UPCOMING SHOOTS</div>
          <div style={{ fontSize:11, color:C.muted }}>ssan203@gmail.com</div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center" }}>
          <span style={{ fontSize:11, color:C.blue, background:`${C.blue}22`, borderRadius:6, padding:"4px 10px" }}>📅 {calEvents.length}</span>
          {!showForm && <button onClick={()=>setShowForm(true)} style={mkBtn(`linear-gradient(135deg,${C.blue},#3a6090)`)}>+ Add</button>}
        </div>
      </div>

      {showForm && (
        <div style={{ background:C.card, border:`1px solid ${C.blue}`, borderRadius:12, padding:16, marginBottom:14 }}>
          <div style={{ fontSize:13, fontWeight:800, color:C.blue, marginBottom:10, letterSpacing:1 }}>NEW SHOOT EVENT</div>
          <div style={{ fontSize:11, color:C.muted, marginBottom:12 }}>Fills in Google Calendar — just tap Save there.</div>
          {missing && <div style={{ background:"#1a0f0f", border:`1px solid ${C.red}44`, borderRadius:8, padding:"8px 12px", marginBottom:10, fontSize:12, color:C.red }}>⚠️ Title, date, start & end time required.</div>}
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
            <div style={{ gridColumn:"1/-1" }}><Field label="Title *"><input value={form.title} onChange={e=>s("title",e.target.value)} style={inp} placeholder="Car Show · Wildlife…"/></Field></div>
            <Field label="Date *"><input type="date" value={form.date} onChange={e=>s("date",e.target.value)} style={inp}/></Field>
            <Field label="Location"><input value={form.location} onChange={e=>s("location",e.target.value)} style={inp} placeholder="Loveland, CO"/></Field>
            <Field label="Start *"><input type="time" value={form.startTime} onChange={e=>s("startTime",e.target.value)} style={inp}/></Field>
            <Field label="End *"><input type="time" value={form.endTime} onChange={e=>s("endTime",e.target.value)} style={inp}/></Field>
            <div style={{ gridColumn:"1/-1" }}><Field label="Notes"><input value={form.notes} onChange={e=>s("notes",e.target.value)} style={inp} placeholder="What are you shooting?"/></Field></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={handleOpen} style={mkBtn(`linear-gradient(135deg,${C.blue},#3a6090)`)}>📅 Open in Google Calendar</button>
            <button onClick={()=>{setShowForm(false);setMissing(false);}} style={mkBtn(C.subtle,C.muted)}>Cancel</button>
          </div>
        </div>
      )}

      {calEvents.length===0
        ? <div style={{ color:C.muted, textAlign:"center", padding:40, fontSize:13 }}>No upcoming events.</div>
        : calEvents.map(ev => <CalEventCard key={ev.id} ev={ev} onDelete={id=>setCalEvents(p=>p.filter(e=>e.id!==id))}/>)
      }
      <div style={{ background:"#111", border:`1px solid ${C.border}`, borderRadius:10, padding:"10px 14px", marginTop:8, fontSize:11, color:C.muted }}>
        💡 Deleting here removes from this tool. Use <strong style={{color:C.white}}>Delete + open GCal</strong> to also remove from Gmail.
      </div>
    </div>
  );
}

function CalEventCard({ ev, onDelete }) {
  const [confirm, setConfirm] = useState(false);
  const start  = ev.start?.dateTime || ev.start?.date;
  const isAuto = /car show|car showing|auto/i.test(ev.summary||"");
  const isTrain= /train|big boy|4014/i.test(ev.summary||"");
  const isFest = /festival|fair|food/i.test(ev.summary||"");
  const accent = isAuto?C.orange:isTrain?C.blue:isFest?C.purple:C.gold;
  const emoji  = isAuto?"🚗":isTrain?"🚂":isFest?"🎪":"📸";
  const isNew  = ev.id?.startsWith("local-");
  const gcalURL= `https://calendar.google.com/calendar/r/search?q=${encodeURIComponent(ev.summary||"")}`;
  return (
    <div style={{ background:C.card, border:`1px solid ${accent}22`, borderLeft:`3px solid ${accent}`, borderRadius:12, padding:"12px 14px", marginBottom:10 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ flex:1, minWidth:0 }}>
          <div style={{ display:"flex", gap:8, flexWrap:"wrap", alignItems:"center" }}>
            <span style={{ fontWeight:700, fontSize:14, color:C.white }}>{emoji} {ev.summary}</span>
            {isNew && <span style={{ fontSize:10, background:`${C.green}22`, color:C.green, borderRadius:4, padding:"2px 6px", fontWeight:700 }}>ADDED ✓</span>}
          </div>
          {ev.location && <div style={{ fontSize:11, color:C.muted, marginTop:3 }}>📍 {ev.location}</div>}
          {start && <div style={{ fontSize:11, color:accent, marginTop:2, fontWeight:700 }}>{fmtDT(start)}</div>}
        </div>
        <button onClick={()=>setConfirm(true)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:20, padding:"0 4px" }}>×</button>
      </div>
      {confirm && (
        <div style={{ marginTop:8 }}>
          <ConfirmRow
            label={isNew?"Delete":"Delete + open GCal"}
            onConfirm={()=>{ onDelete(ev.id); if(!isNew) window.open(gcalURL,"_blank"); }}
            onCancel={()=>setConfirm(false)}
          />
        </div>
      )}
    </div>
  );
}

// ── Shoot Form ────────────────────────────────────────────────────────────────
function ShootForm({ type, onAdd, onCancel }) {
  const [f, setF] = useState({ date:"", location:"", lens:"", keeper:"", totalShots:"", revenue:"", entryCost:"", mileage:"", notes:"" });
  const s = (k,v) => setF(p=>({...p,[k]:v}));
  const hasRevenue = ["automotive","event"].includes(type.id);
  const submit = () => {
    if(!f.date) return;
    onAdd({ ...f, id:"sh"+Date.now(), type:type.id, typeLabel:type.label, typeEmoji:type.emoji, typeColor:type.color,
      keeper:parseInt(f.keeper)||0, totalShots:parseInt(f.totalShots)||0,
      revenue:parseFloat(f.revenue)||0, entryCost:parseFloat(f.entryCost)||0,
      mileage:parseFloat(f.mileage)||0, date:f.date });
  };
  return (
    <div style={{ background:C.card, border:`1px solid ${type.color}`, borderRadius:12, padding:16, marginBottom:14 }}>
      <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:14 }}>
        <span style={{ fontSize:22 }}>{type.emoji}</span>
        <div style={{ fontSize:14, fontWeight:800, color:type.color, letterSpacing:1 }}>{type.label.toUpperCase()} SESSION</div>
      </div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
        <Field label="Date *"><input type="date" value={f.date} onChange={e=>s("date",e.target.value)} style={inp}/></Field>
        <Field label="Location"><input value={f.location} onChange={e=>s("location",e.target.value)} style={inp} placeholder="Where?"/></Field>
        <Field label="Lens"><input value={f.lens} onChange={e=>s("lens",e.target.value)} style={inp} placeholder="100-500mm…"/></Field>
        <Field label="Miles Driven"><input type="number" value={f.mileage} onChange={e=>s("mileage",e.target.value)} style={inp} placeholder="0"/></Field>
        <Field label="Keeper Shots"><input type="number" value={f.keeper} onChange={e=>s("keeper",e.target.value)} style={inp} placeholder="0"/></Field>
        <Field label="Total Shots"><input type="number" value={f.totalShots} onChange={e=>s("totalShots",e.target.value)} style={inp} placeholder="0"/></Field>
        {hasRevenue && <>
          <Field label="Revenue ($)"><input type="number" step="0.01" value={f.revenue} onChange={e=>s("revenue",e.target.value)} style={inp} placeholder="0.00"/></Field>
          <Field label="Entry Cost ($)"><input type="number" step="0.01" value={f.entryCost} onChange={e=>s("entryCost",e.target.value)} style={inp} placeholder="0.00"/></Field>
        </>}
        <div style={{ gridColumn:"1/-1" }}><Field label="Notes"><input value={f.notes} onChange={e=>s("notes",e.target.value)} style={inp} placeholder="Highlights, conditions…"/></Field></div>
      </div>
      {f.keeper>0 && f.totalShots>0 && (
        <div style={{ background:"#111", borderRadius:8, padding:"8px 12px", marginBottom:10, fontSize:12, color:C.muted }}>
          Hit rate: <strong style={{color:type.color}}>{Math.round((f.keeper/f.totalShots)*100)}%</strong> · {f.keeper} keepers from {f.totalShots} shots
        </div>
      )}
      <div style={{ display:"flex", gap:8 }}>
        <button onClick={submit} style={{ background:`linear-gradient(135deg,${type.color},${type.color}99)`, border:"none", borderRadius:7, color:"#000", padding:"10px 18px", fontSize:14, fontWeight:700, cursor:"pointer", fontFamily:"inherit" }}>Log Session</button>
        <button onClick={onCancel} style={mkBtn(C.subtle,C.muted)}>Cancel</button>
      </div>
    </div>
  );
}

function ShootRow({ item, onDelete }) {
  const [confirm, setConfirm] = useState(false);
  const keepRate = item.totalShots>0?Math.round((item.keeper/item.totalShots)*100):null;
  const net = (item.revenue||0)-(item.entryCost||0);
  return (
    <div style={{ background:C.card, border:`1px solid ${item.typeColor||C.gold}22`, borderLeft:`3px solid ${item.typeColor||C.gold}`, borderRadius:12, padding:"12px 14px", marginBottom:8 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
            <span>{item.typeEmoji}</span>
            <span style={{ fontWeight:700, fontSize:14, color:C.white }}>{item.typeLabel}</span>
            <span style={{ fontSize:10, background:`${item.typeColor||C.gold}22`, color:item.typeColor||C.gold, borderRadius:4, padding:"2px 6px", fontWeight:700 }}>{fmtDate(item.date)}</span>
          </div>
          {item.location && <div style={{ fontSize:11, color:C.muted, marginTop:3 }}>📍 {item.location}</div>}
          {item.lens     && <div style={{ fontSize:11, color:C.muted, marginTop:2 }}>🔭 {item.lens}</div>}
          {item.notes    && <div style={{ fontSize:11, color:C.muted, marginTop:2, fontStyle:"italic" }}>{item.notes}</div>}
        </div>
        <div style={{ textAlign:"right", flexShrink:0, marginLeft:10 }}>
          {item.keeper>0   && <div style={{ fontSize:14, fontWeight:800, color:item.typeColor||C.gold }}>{item.keeper} keepers</div>}
          {keepRate!==null && <div style={{ fontSize:11, color:C.muted }}>{keepRate}% hit rate</div>}
          {item.revenue>0  && <div style={{ fontSize:12, fontWeight:700, color:net>=0?C.green:C.red, marginTop:2 }}>{net>=0?"+":""}{fmtMoney(net)}</div>}
          <button onClick={()=>setConfirm(true)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:20, padding:"2px 0" }}>×</button>
        </div>
      </div>
      {confirm && <div style={{ marginTop:8 }}><ConfirmRow onConfirm={()=>onDelete(item.id)} onCancel={()=>setConfirm(false)}/></div>}
    </div>
  );
}

// ── Expense Form / Row ────────────────────────────────────────────────────────
function ExpenseForm({ onAdd, onCancel }) {
  const [f, setF] = useState({ date:"", item:"", category:"", vendor:"", amount:"", notes:"" });
  const s=(k,v)=>setF(p=>({...p,[k]:v}));
  const submit=()=>{
    if(!f.item.trim()||!f.amount) return;
    onAdd({...f, id:"e"+Date.now(), amount:parseFloat(f.amount)||0, date:f.date||new Date().toISOString().split("T")[0]});
  };
  return (
    <div style={{ background:C.card, border:`1px solid ${C.green}`, borderRadius:12, padding:16, marginBottom:14 }}>
      <div style={{ fontSize:14, fontWeight:800, color:C.green, marginBottom:14, letterSpacing:1 }}>NEW EXPENSE</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:12 }}>
        <Field label="Date"><input type="date" value={f.date} onChange={e=>s("date",e.target.value)} style={inp}/></Field>
        <Field label="Category">
          <select value={f.category} onChange={e=>s("category",e.target.value)} style={{...inp,appearance:"none"}}>
            <option value="">Select…</option>
            {EXPENSE_CATS.map(c=><option key={c}>{c}</option>)}
          </select>
        </Field>
        <div style={{ gridColumn:"1/-1" }}><Field label="Item *"><input value={f.item} onChange={e=>s("item",e.target.value)} style={inp} placeholder="What did you buy?"/></Field></div>
        <Field label="Vendor"><input value={f.vendor} onChange={e=>s("vendor",e.target.value)} style={inp} placeholder="B&H, Amazon…"/></Field>
        <Field label="Amount ($)"><input type="number" step="0.01" value={f.amount} onChange={e=>s("amount",e.target.value)} style={inp} placeholder="0.00"/></Field>
        <div style={{ gridColumn:"1/-1" }}><Field label="Notes"><input value={f.notes} onChange={e=>s("notes",e.target.value)} style={inp} placeholder="Optional"/></Field></div>
      </div>
      <div style={{ display:"flex", gap:8 }}>
        <button onClick={submit} style={mkBtn(`linear-gradient(135deg,${C.green},#2a6040)`)}>Add Expense</button>
        <button onClick={onCancel} style={mkBtn(C.subtle,C.muted)}>Cancel</button>
      </div>
    </div>
  );
}

function ExpenseRow({ item, onDelete }) {
  const [confirm, setConfirm] = useState(false);
  return (
    <div style={{ background:C.card, border:`1px solid ${C.gold}22`, borderLeft:`3px solid ${C.gold}`, borderRadius:12, padding:"12px 14px", marginBottom:8 }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <div style={{ flex:1 }}>
          <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
            <span style={{ fontWeight:700, fontSize:14, color:C.white }}>{item.item}</span>
            {item.category && <span style={{ fontSize:10, background:`${C.gold}22`, color:C.gold, borderRadius:4, padding:"2px 6px", fontWeight:700 }}>{item.category}</span>}
          </div>
          {item.vendor && <div style={{ fontSize:11, color:C.muted, marginTop:3 }}>{item.vendor} · {fmtDate(item.date)}</div>}
          {item.notes  && <div style={{ fontSize:11, color:C.muted, marginTop:2, fontStyle:"italic" }}>{item.notes}</div>}
        </div>
        <div style={{ textAlign:"right", flexShrink:0, marginLeft:10 }}>
          <div style={{ fontSize:15, fontWeight:800, color:C.gold }}>{fmtMoney(item.amount)}</div>
          <button onClick={()=>setConfirm(true)} style={{ background:"none", border:"none", color:C.muted, cursor:"pointer", fontSize:20 }}>×</button>
        </div>
      </div>
      {confirm && <div style={{ marginTop:8 }}><ConfirmRow onConfirm={()=>onDelete(item.id)} onCancel={()=>setConfirm(false)}/></div>}
    </div>
  );
}

// ── Main App ──────────────────────────────────────────────────────────────────
function App() {
  const [tab, setTab]             = useState("calendar");
  const [expenses, setExpenses]   = useState([]);
  const [shoots, setShoots]       = useState([]);
  const [calEvents, setCalEvents] = useState(GOOGLE_EVENTS);
  const [showShootPicker, setShowShootPicker] = useState(false);
  const [selectedType, setSelectedType]       = useState(null);
  const [showExpForm, setShowExpForm]         = useState(false);
  const [ready, setReady]         = useState(false);

  useEffect(()=>{
    (async()=>{
      try {
        const raw = await window.storage.get("bd-tracker-v2");
        if(raw) {
          const d = JSON.parse(raw.value);
          setExpenses(d.expenses||[]);
          setShoots(d.shoots||[]);
          if(d.calEvents) setCalEvents(d.calEvents);
        }
      } catch {}
      setReady(true);
    })();
  },[]);

  const persist = useCallback((exp,sh,cal)=>{
    window.storage.set("bd-tracker-v2", JSON.stringify({expenses:exp,shoots:sh,calEvents:cal||calEvents})).catch(()=>{});
  },[calEvents]);

  const updateCal = (fn) => { const n=fn(calEvents); setCalEvents(n); persist(expenses,shoots,n); };
  const addExpense  = i => { const n=[...expenses,i]; setExpenses(n); persist(n,shoots); setShowExpForm(false); };
  const delExpense  = id=> { const n=expenses.filter(e=>e.id!==id); setExpenses(n); persist(n,shoots); };
  const addShoot    = i => { const n=[...shoots,i]; setShoots(n); persist(expenses,n); setSelectedType(null); setShowShootPicker(false); };
  const delShoot    = id=> { const n=shoots.filter(s=>s.id!==id); setShoots(n); persist(expenses,n); };
  const resetShoots = () => { setShowShootPicker(false); setSelectedType(null); };

  const totalExpenses = expenses.reduce((s,e)=>s+(e.amount||0),0);
  const totalRevenue  = shoots.reduce((s,sh)=>s+(sh.revenue||0),0);
  const totalCosts    = shoots.reduce((s,sh)=>s+(sh.entryCost||0),0);
  const netProfit     = totalRevenue - totalCosts - totalExpenses;
  const totalKeepers  = shoots.reduce((s,sh)=>s+(sh.keeper||0),0);
  const totalShots    = shoots.reduce((s,sh)=>s+(sh.totalShots||0),0);
  const shootsByType  = SHOOT_TYPES.map(t=>(({...t,count:shoots.filter(s=>s.type===t.id).length}))).filter(t=>t.count>0);

  if(!ready) return (
    <div style={{background:"#0a0a0a",height:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16}}>
      <img src={LOGO_SRC} style={{width:80,height:80,borderRadius:"50%",objectFit:"cover"}}/>
      <div style={{color:C.gold,fontFamily:"'Barlow Condensed',sans-serif",fontSize:16,letterSpacing:2,textTransform:"uppercase"}}>Loading…</div>
    </div>
  );

  return (
    <div style={{fontFamily:"'Barlow Condensed','Arial Narrow',sans-serif",background:"#0a0a0a",minHeight:"100vh",color:C.white}}>

      {/* Header */}
      <div style={{background:"#111",borderBottom:"1px solid #2a2a2a",padding:"12px 16px 0",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12}}>
          <img src={LOGO_SRC} style={{width:38,height:38,borderRadius:"50%",objectFit:"cover",border:`2px solid ${C.gold}`}}/>
          <div>
            <div style={{fontSize:20,fontWeight:900,color:C.gold,letterSpacing:2,textTransform:"uppercase",lineHeight:1}}>BeardedDad</div>
            <div style={{fontSize:10,color:C.muted,letterSpacing:3,textTransform:"uppercase"}}>Photography · Field Tracker</div>
          </div>
          <div style={{marginLeft:"auto",textAlign:"right"}}>
            <div style={{fontSize:10,color:C.muted,letterSpacing:1}}>NET P&L</div>
            <div style={{fontSize:18,fontWeight:900,color:netProfit>=0?C.green:C.red}}>{netProfit>=0?"+":""}{fmtMoney(netProfit)}</div>
          </div>
        </div>
        <div style={{display:"flex",borderTop:"1px solid #1a1a1a"}}>
          {TABS.map(t=>(
            <button key={t.id} onClick={()=>{setTab(t.id);resetShoots();setShowExpForm(false);}} style={{
              flex:1, background:"none", border:"none",
              borderBottom:tab===t.id?`2px solid ${t.color}`:"2px solid transparent",
              color:tab===t.id?t.color:C.muted, padding:"8px 4px", fontSize:11, fontWeight:700,
              cursor:"pointer", fontFamily:"'Barlow Condensed',sans-serif", whiteSpace:"nowrap"
            }}>{t.label}</button>
          ))}
        </div>
      </div>

      {/* Content */}
      <div style={{padding:"16px 16px 80px"}}>

        {tab==="calendar" && <CalendarTab calEvents={calEvents} setCalEvents={(fn)=>updateCal(typeof fn==="function"?fn:()=>fn)}/>}

        {tab==="shoots" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:18,fontWeight:800,color:C.gold,letterSpacing:1}}>SHOOT LOG</div>
                <div style={{fontSize:11,color:C.muted}}>{shoots.length} sessions · {totalKeepers} keepers</div>
              </div>
              {!showShootPicker&&!selectedType
                ?<button onClick={()=>setShowShootPicker(true)} style={mkBtn(`linear-gradient(135deg,${C.gold},${C.goldDark})`)}>+ Log Shoot</button>
                :<button onClick={resetShoots} style={mkBtn(C.subtle,C.muted)}>✕ Cancel</button>
              }
            </div>

            {showShootPicker&&!selectedType&&(
              <div style={{marginBottom:14}}>
                <div style={{fontSize:11,color:C.muted,marginBottom:12,letterSpacing:1.5,textTransform:"uppercase",fontWeight:700}}>Select Shoot Type</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                  {SHOOT_TYPES.map(t=>(
                    <button key={t.id} onClick={()=>{setShowShootPicker(false);setSelectedType(t);}} style={{
                      background:C.card, border:`1px solid ${t.color}33`, borderRadius:10,
                      padding:"14px 10px", cursor:"pointer", display:"flex", alignItems:"center",
                      gap:10, fontFamily:"'Barlow Condensed',sans-serif", textAlign:"left",
                    }}>
                      <span style={{fontSize:22}}>{t.emoji}</span>
                      <span style={{fontSize:13,fontWeight:700,color:C.white}}>{t.label}</span>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {selectedType && <ShootForm type={selectedType} onAdd={addShoot} onCancel={resetShoots}/>}

            {!showShootPicker&&!selectedType&&(
              shoots.length===0
                ?<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:40}}>Tap <strong style={{color:C.gold}}>+ Log Shoot</strong> to record your first session.</div>
                :[...shoots].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(sh=><ShootRow key={sh.id} item={sh} onDelete={delShoot}/>)
            )}
          </div>
        )}

        {tab==="expenses" && (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <div>
                <div style={{fontSize:18,fontWeight:800,color:C.green,letterSpacing:1}}>EXPENSE TRACKER</div>
                <div style={{fontSize:11,color:C.muted}}>{expenses.length} entries · {fmtMoney(totalExpenses)} total</div>
              </div>
              {!showExpForm&&<button onClick={()=>setShowExpForm(true)} style={mkBtn(`linear-gradient(135deg,${C.green},#2a6040)`)}>+ Add</button>}
            </div>
            {showExpForm&&<ExpenseForm onAdd={addExpense} onCancel={()=>setShowExpForm(false)}/>}
            {expenses.length===0&&!showExpForm
              ?<div style={{color:C.muted,fontSize:13,textAlign:"center",padding:40}}>Track your gear, travel, and business costs here.</div>
              :[...expenses].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(e=><ExpenseRow key={e.id} item={e} onDelete={delExpense}/>)
            }
          </div>
        )}

        {tab==="summary" && (
          <div>
            <div style={{fontSize:18,fontWeight:800,color:C.white,letterSpacing:1,marginBottom:14}}>P&L OVERVIEW</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <StatCard label="Revenue"    value={fmtMoney(totalRevenue)}  color={C.green}/>
              <StatCard label="Event Costs"value={fmtMoney(totalCosts)}    color={C.orange}/>
              <StatCard label="Expenses"   value={fmtMoney(totalExpenses)} color={C.gold}/>
              <StatCard label="Net Profit" value={fmtMoney(netProfit)}     color={netProfit>=0?C.green:C.red}/>
            </div>
            <div style={{fontSize:14,fontWeight:800,color:C.white,letterSpacing:1,marginBottom:10}}>SHOOT STATS</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              <StatCard label="Sessions"   value={shoots.length}  color={C.gold}/>
              <StatCard label="Keepers"    value={totalKeepers}   color={C.blue}/>
              <StatCard label="Total Shots"value={totalShots}     color={C.purple}/>
              <StatCard label="Hit Rate"   value={totalShots>0?Math.round((totalKeepers/totalShots)*100)+"%":"—"} color={C.blue}/>
            </div>
            {shootsByType.length>0&&(
              <>
                <div style={{fontSize:14,fontWeight:800,color:C.white,letterSpacing:1,marginBottom:10}}>BY TYPE</div>
                {shootsByType.map(t=>(
                  <div key={t.id} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #2a2a2a"}}>
                    <span style={{fontSize:13,color:C.white}}>{t.emoji} {t.label}</span>
                    <span style={{fontSize:13,fontWeight:700,color:t.color}}>{t.count} session{t.count!==1?"s":""}</span>
                  </div>
                ))}
                <div style={{marginBottom:16}}/>
              </>
            )}
            {expenses.length>0&&(
              <>
                <div style={{fontSize:14,fontWeight:800,color:C.white,letterSpacing:1,marginBottom:10}}>EXPENSE BREAKDOWN</div>
                {Object.entries(expenses.reduce((a,e)=>{const c=e.category||"Other";a[c]=(a[c]||0)+e.amount;return a;},{}))
                  .sort((a,b)=>b[1]-a[1]).map(([cat,total])=>(
                    <div key={cat} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid #2a2a2a"}}>
                      <span style={{fontSize:13,color:C.white}}>{cat}</span>
                      <span style={{fontSize:13,fontWeight:700,color:C.gold}}>{fmtMoney(total)}</span>
                    </div>
                  ))
                }
              </>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
